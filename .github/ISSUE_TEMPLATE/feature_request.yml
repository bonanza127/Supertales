name: Feature Request
description: Suggest a feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
